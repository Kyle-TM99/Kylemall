<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<th:block layout:fragment="content">
<script src=
	"https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
	<div class="container my-5 border p-4 rounded" style="max-width: 550px">
		<div class="text-center my-4">
			<img src="images/kylemall2.png" style="width: 180px; height: 25px" />
		</div>
		<div class="text-center fw-bold fs-3 mb-4">
			<p>회원 가입</p>
		</div>
		<div class="text-center mb-5">
			<p class="text-body-secondary">
				회원가입에 필요한 기본정보를 입력해주세요.
			</p>
		</div>
		<form action="joinResult" name="joinForm" method="post" id="joinForm">
			<div class="mb-3">
			<input type="hidden" name="isIdCheck" id="isIdCheck" value="false"/>
				<label for="name" class="form-label">이름 입력</label>
				<input type="text" class="form-control" id="name" name="name" placeholder="이름 입력" />
			</div>
			<div class="mb-3">
				<label for="nickname" class="form-label">닉네임 입력</label>
				<input type="text" class="form-control" id="nickname" name="nickname" placeholder="닉네임 입력" />
			</div>
			<div class="mb-3">
				<label for="id" class="form-label">아이디 입력</label>
				<div class="input-group">
					<input type="text" class="form-control" name="id" id="id" placeholder="아이디 입력" />
					<input type="button" class="btn btn-outline-primary" id="btnOverlapId" value="중복확인">
				</div>
			</div>
			<div class="mb-3">
				<label for="pass1" class="form-label">비밀번호</label>
				<input type="password" class="form-control" name="pass1" id="pass1" placeholder="비밀번호 입력" />
			</div>
			<div class="mb-3">
				<label for="pass2" class="form-label">비밀번호 확인</label>
				<input type="password" class="form-control" name="pass2" id="pass2" placeholder="비밀번호 재입력" />
			</div>
			<div class="mb-3">
				<label for="zipcode" class="form-label">우편번호</label>
				<div class="input-group">
					<input type="text" class="form-control" name="zipcode" id="zipcode" placeholder="우편번호" maxlength="5" readonly/>
					<input type="button" class="btn btn-outline-primary" id="btnZipcode" value="우편번호 찾기">
				</div>
			</div>

			<div class="mb-3">
				<label for="address" class="form-label">주소</label>
				<input type="text" class="form-control" name="address1" id="address1"  readonly placeholder="주소" />
			</div>
			<div class="mb-3">
				<label for="detailedAddress" class="form-label">상세주소 입력</label>
				<input type="text" class="form-control" name="address2" id="address2" placeholder="상세주소 입력" />
			</div>
			<div class="row mb-3">
				<label for="mobile2" class="form-label">휴대폰 번호</label>
				<div class="col-4 pe-1">
					<select class="form-select" name="mobile1" id="mobile1">
						<option>010</option>
						<option>011</option>
						<option>016</option>
						<option>017</option>
						<option>018</option>
						<option>019</option>
					</select>
				</div>
				<div class="col-4 pe-1 ps-1">
					<input type="text" class="form-control" name="mobile2" id="mobile2" maxlength="4"/>
				</div>
				<div class="col-4 ps-1">
					<input type="text" class="form-control" name="mobile3" id="mobile3" maxlength="4"/>
				</div>
			</div>

			<div class="row mb-3">
				<label for="emailId" class="form-label">이메일</label>
				<div class="col-4 pe-1">
					<input type="text" class="form-control" name="emailId" id="emailId" />
				</div>
				<div class="col-4 pe-0 ps-1">
					<input type="text" class="form-control" name="emailDomain" id="emailDomain" placeholder="@" />
				</div>
				<div class="col-4 ps-1">
					<select class="form-select" name="selectDomain" id="selectDomain">
						<option>직접입력</option>
						<option>naver.com</option>
						<option>daum.net</option>
						<option>hanmail.net</option>
						<option>gmail.com</option>
					</select>
				</div>
			</div>
			<div class="mb-3">
				<div class="form-check form-switch my-3">
					<input class="form-check-input" type="checkbox" role="switch" name="emailGet" id="emailGet" />
					<label class="form-check-label" for="emailGet">이메일 수신 동의</label>
				</div>
			</div>
			<div class="d-grid gap-2 d-md-flex justify-content-md-end">
				<input class="btn btn-primary" type="submit" value="가입하기">
			</div>
		</form>
	</div>
</th:block>

</html>
