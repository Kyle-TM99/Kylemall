<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">
<head>
    <title>추가 정보 입력</title>
</head>
<body>
    <div layout:fragment="content">
        <form action="/google/register" method="post">
            <input type="hidden" name="id" th:value="${session.googleEmail}">
            <input type="hidden" name="name" th:value="${session.googleName}">
            
            <div class="form-group">
                <label>닉네임</label>
                <input type="text" name="nickname" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>휴대폰</label>
                <div class="d-flex">
                    <input type="text" name="mobile1" class="form-control" maxlength="3" required>
                    <input type="text" name="mobile2" class="form-control" maxlength="4" required>
                    <input type="text" name="mobile3" class="form-control" maxlength="4" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>우편번호</label>
                <input type="text" name="zipcode" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>주소</label>
                <input type="text" name="address1" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>상세주소</label>
                <input type="text" name="address2" class="form-control">
            </div>
            
            <div class="form-check">
                <input type="checkbox" name="emailGet" class="form-check-input">
                <label class="form-check-label">이메일 수신 동의</label>
            </div>
            
            <button type="submit" class="btn btn-primary">가입하기</button>
        </form>
    </div>
</body>
</html>
