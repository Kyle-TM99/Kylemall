<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/main_layout}">
<head>
    <title>고객지원 FAQ</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .faq-header {
            margin-bottom: 20px;
        }
        .faq-answer {
            display: none; /* 기본적으로 답변을 숨깁니다. */
        }
    </style>
</head>
<th:block layout:fragment="content">
    <div class="container mt-5">
        <header class="faq-header text-center">
            <h1>고객지원 FAQ</h1>
        </header>
        <div class="faq-container">
            <div class="faq-item">
                <h2 class="faq-question" style="cursor: pointer; color: #007BFF;">배송은 얼마나 걸리나요?</h2>
                <p class="faq-answer">배송은 보통 2~3일 정도 소요되며, 지역에 따라 다를 수 있습니다.</p>
            </div>
            <div class="faq-item">
                <h2 class="faq-question" style="cursor: pointer; color: #007BFF;">반품은 어떻게 하나요?</h2>
                <p class="faq-answer">상품 수령 후 7일 이내에 반품 요청을 하실 수 있습니다. 고객센터에 문의해주세요.</p>
            </div>
            <div class="faq-item">
                <h2 class="faq-question" style="cursor: pointer; color: #007BFF;">결제 방법은 무엇이 있나요?</h2>
                <p class="faq-answer">신용카드, 계좌이체, 휴대폰 결제 등 다양한 결제 방법을 지원합니다.</p>
            </div>
            <!-- 추가 FAQ 항목을 여기에 추가할 수 있습니다. -->
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $('.faq-question').click(function() {
                $(this).next('.faq-answer').slideToggle(); // 클릭된 질문의 다음 답변을 토글합니다.
            });
        });
    </script>
</th:block>
</html>
