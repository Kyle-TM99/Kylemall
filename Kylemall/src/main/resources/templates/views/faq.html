<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">

<head>
	<title>고객지원 FAQ</title>
	<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
	<style>
		.faq-header {
			margin-bottom: 20px;
		}

		.faq-answer {
			display: none;
			/* 기본적으로 답변을 숨깁니다. */
		}
	</style>
</head>
<th:block layout:fragment="content">
	<div class="container mt-5">
		<header class="faq-header text-center mb-5">
			<h1>FAQ</h1>
		</header>
		<div class="text-end">
			<th:block th:if="${session.member != null and session.member.isAdmin == '1'}">
				<a href="addFaq" class="btn btn-primary btn-sm">FAQ 등록</a>
			</th:block>
		</div>
		<div id="faqList" class="faq-container">
			<th:block th:each="faq, status:${csFaq}">
				<div class="faq-item my-5" id="faq-[[${faq.faqId}]]">
				    <h2 class="faq-question" style="cursor: pointer; color: #007BFF;">[[${faq.question}]]</h2>
				    <div class="faq-answer fs-5">
				        <span>[[${faq.answer}]]</span>
				        <input type="hidden" th:value="${faq.faqId}">
						<button class="btn btn-danger btn-sm mt-2" id="deleteFaqBtn">삭제</button>
				    </div>
				</div>

			</th:block>
		</div>
	</div>

	<script>
		$(document).ready(function () {
			$('.faq-question').click(function () {
				$(this).next('.faq-answer').slideToggle(); // 클릭된 질문의 다음 답변을 토글합니다.
			});
			
			$('#deleteFaqBtn').click(function () {
				
				let faqId = $("#faqId")
				
			})
		});
		
		function deleteFaq(faqId) {
			
			console.log(faqId);
			
		    if (!confirm('정말로 삭제하시겠습니까?')) {
		        return; // 사용자가 삭제를 취소한 경우
		    }

		    $.ajax({
		        url: `deleteFaq.ajax`,
		        type: 'post',
		        data: { faqId: faqId },
		        dataType: "json",
		        success: function (resData) {
		            $("#faqList").empty();

		            resData.faqList.forEach(function (v) {
		                let result = `
		                    <div class="faq-item my-5" id="faq-${v.faqId}">
		                        <h2 class="faq-question" style="cursor: pointer; color: #007BFF;">${v.question}</h2>
		                        <div class="faq-answer fs-5">
		                            <span>${v.answer}</span>
		                            <input type="hidden" value="${v.faqId}">
		                            <button class="btn btn-danger btn-sm mt-2" onclick="deleteFaq(${v.faqId})">삭제</button>
		                        </div>
		                    </div>
		                `;
		                $("#faqList").append(result);
		            });
		        },
		        error: function (xhr, status, error) {
		            console.error('삭제 요청 중 오류 발생:', error);
		            alert('FAQ 삭제에 실패했습니다.');
		        }
		    });
		}

		
	</script>
</th:block>

</html>
