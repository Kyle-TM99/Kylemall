<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<th:block layout:fragment="content">
	
<div class="container mt-5">
    <div class="card p-4 shadow">
        <h1 class="text-center text-success">주문이 완료되었습니다!</h1>
        <p class="text-center">고객님의 주문이 성공적으로 접수되었습니다. 감사합니다!</p>
        <hr>
        <div class="order-details mt-3">
            <h3>주문 상세 정보</h3>
            <table class="table table-bordered mt-3">
                <tbody>
                    <tr>
                        <th scope="row">주문 번호</th>
                        <td id="order-id">2024123456</td>
                    </tr>
                    <tr>
                        <th scope="row">상품명</th>
                        <td id="product-name">테스트 상품</td>
                    </tr>
                    <tr>
                        <th scope="row">결제 금액</th>
                        <td id="product-price">10,000원</td>
                    </tr>
                    <tr>
                        <th scope="row">결제 수단</th>
                        <td id="payment-method">카카오페이</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="text-center mt-4">
            <a href="/products" class="btn btn-primary">쇼핑 계속하기</a>
            <a href="/orders" class="btn btn-secondary">주문 내역 보기</a>
        </div>
    </div>
</div>

</th:block>
</html>
