<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main_layout}">
<div layout:fragment="content" class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
	<div th:if="${param.error}" class="alert alert-danger" role="alert">
		<span th:if="${param.message}" th:text="${param.message}"></span>
		<span th:unless="${param.message}">로그인 처리 중 오류가 발생했습니다.</span>
	</div>
	<div class="container d-flex justify-content-center align-items-center vh-80">
		<div class="card p-4" style="width: 350px;">
			<div class="d-flex justify-content-center mb-2">
				<img src="images/kylemall2.png" style="width: 180px; height: 25px" />
			</div>
			<h5 class="text-center fw-bold">
				<p class="mb-2">L O G I N</p>
			</h5>
			<p class="text-center text-muted mt-4 mb-5">Korea No.1 Shoping Mall</p>
			<a href="https://kauth.kakao.com/oauth/authorize?response_type=code&client_id=785bf78e1c03819b773c1d0211d3d3a9&redirect_uri=http://localhost:8080/oauth/kakao/callback&scope=profile_nickname,profile_image&prompt=login consent" class="my-3">
				<img src="images/kakao_login_medium_wide.png" alt="카카오 로그인">
			</a>
			<hr>
			<a href="/oauth2/authorization/google" class="btn btn-light w-100 mb-3">
				<img src="https://www.google.com/favicon.ico" alt="Google" style="height: 20px; margin-right: 8px;">
				Google로 로그인
			</a>
			<form id="loginForm" action="login" method="post">
				<div class="form-floating my-3">
					<input type="text" class="form-control" id="userId" name="userId" placeholder="아이디" required>
					<label for="userId">아이디</label>
				</div>
				<div class="form-floating mb-4">
					<input type="password" class="form-control" id="userPass" name="userPass" placeholder="비밀번호"
						required>
					<label for="userPass">비밀번호</label>
				</div>
				<div class="text-end mb-3">
					<a href="#" class="text-decoration-none">계정찾기</a>
				</div>
				<button type="submit" class="btn btn-primary w-100 mb-3">로그인</button>
			</form>
			<div class="text-center mt-3">
				<p>아직 회원이 아니신가요?<a href="joinChoice" class="text-primary text-decoration-none"> 회원가입</a></p>
			</div>
		</div>
	</div>
</div>

</html>
